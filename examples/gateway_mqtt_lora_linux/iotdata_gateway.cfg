# -------------------------------------------------------------------------
# iotdata gateway configuration (defaults)
# -------------------------------------------------------------------------

# lora E22-900T22U (serial)
lora-serial-port=/dev/e22900t22u
lora-serial-rate=9600
lora-serial-bits=8N1
lora-address=0xFFFF
lora-network=0x08
lora-channel=0x0A
lora-crypt=0x0000
lora-packet-size=0
lora-packet-rate=0
lora-transmit-power=0
lora-transmission-method=0
lora-rssi-channel=60
lora-rssi-packet=true
lora-listen-before-transmit=true
lora-read-timeout-command=1000
lora-read-timeout-packet=5000
lora-debug=false

# mqtt broker
mqtt-client=iot_gwy_01
mqtt-server=mqtt://localhost:1883
mqtt-topic-prefix=iotdata
mqtt-tls-insecure=false
mqtt-reconnect-delay=5
mqtt-reconnect-delay-max=60
mqtt-debug=false

# iotdata mesh
mesh-enable=true
mesh-station-id=1
mesh-beacon-interval=60
mesh-debug=false

# iotdata ddup
ddup-enable=true
ddup-port=9876
ddup-peers=192.168.0.2:9876,192.168.0.3:9876
ddup-delay=20
ddup-debug=false

# stat
stat-display-interval=300
stat-publish-interval=300
stat-publish-mqtt-topic-prefix=iotdata/stats

# debug
debug=false
debug-data=false
