# -------------------------------------------------------------------------
# e22900t22utomqtt — iotdata gateway configuration
# -------------------------------------------------------------------------

# serial
port=/dev/e22900t22u
rate=9600
bits=8N1

# lora E22-900T22U
address=0xFFFF
network=0x08
channel=0x0A
packet-size=0
packet-rate=0
crypt=0x0000
transmit-power=0
transmission-method=0
listen-before-transmit=true
rssi-channel=true
rssi-packet=true
read-timeout-command=1000
read-timeout-packet=5000

# mqtt broker
mqtt-client=iot_gwy_01
mqtt-server=mqtt://localhost:1883
mqtt-topic-prefix=iotdata
mqtt-tls-insecure=false
mqtt-reconnect-delay=5
mqtt-reconnect-delay-max=60

# iotdata mesh
mesh-enable=false
mesh-station-id=1
mesh-beacon-interval=60

# iotdata dedup
dedup-enable=false
dedup-port=9876
dedup-peers=192.168.0.2:9876,192.168.0.3:9876
dedup-delay=20

# reporting
stats-display-interval=300
stats-publish-interval=300
interval-rssi=60

# debug
debug=false
debug-e22=false
debug-data=false
debug-mesh=false
debug-dedup=false
